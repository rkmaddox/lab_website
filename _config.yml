encoding: utf-8
title: Maddox Lab
description: >
  Auditory neuroscience research at the Kresge Hearing Research Institute,
  University of Michigan.
url: "https://maddoxlab.org"
baseurl: ""

markdown: kramdown

plugins:
  - jekyll-seo-tag

collections:
  updates:
    output: true
    permalink: /updates/:title/

defaults:
  - scope:
      path: ""
      type: updates
    values:
      layout: update

# Exclude files from the built site
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - fetch_publications.py
  - requirements.txt
  - .venv
  - DO_NOT_POST
