<nav class="navbar navbar-expand-md navbar-dark bg-michigan-blue sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ '/' | relative_url }}">Maddox Lab</a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false"
            aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        {% for link in site.data.navigation %}
        <li class="nav-item">
          <a class="nav-link{% if page.url == link.url %} active{% endif %}"
             href="{{ link.url | relative_url }}">{{ link.title }}</a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</nav>
